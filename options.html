<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>phab-try Settings</title>
  <style>
    body  { font-family: system-ui; }
    input { width: 100%; box-sizing: border-box; }
    #status.ok    { color: green; }
    #status.error { color: red;   }
  </style>
</head>
<body>
  <label for="email">Your Treeherder / Bugzilla email address</label>
  <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  <p>
    Used to search your push history directly instead of scanning recent
    pushes. Leave blank to auto-detect (slower for older pushes).
  </p>
  <button id="save">Save</button>
  <p id="status"></p>
  <hr>
  <p>
    Clears the cached Mercurial commit data and push history stored locally.
    Use this if push results look stale or incorrect.
  </p>
  <button id="flush">Flush caches</button>
  <script src="options.js"></script>
</body>
</html>
