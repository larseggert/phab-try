name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Sign and release
    runs-on: ubuntu-latest
    environment: release   # env secrets scoped here
    permissions:
      contents: write  # create GitHub release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # No actions/setup-node — skips the GitHub Actions npm cache, which is the
      # cache-poisoning vector. npm ci still verifies the lockfile on every run.
      - run: npm ci

      # TAG_REF via env avoids injection through a crafted tag name.
      - name: Verify version matches tag
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG="${TAG_REF#v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match manifest.json version $MANIFEST"
            exit 1
          fi

      - name: Lint JS
        run: npm run lint:js

      - name: Lint extension
        run: npm run lint:ext

      # Build locally first — validates file collection and structure before touching AMO.
      - name: Build extension
        run: npm run build

      # Secrets are stored in the "release" GitHub environment.
      - name: Sign extension (AMO)
        run: npm run sign
        env:
          WEB_EXT_API_KEY:    ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}

      # GitHub release is a changelog/version marker; users install from addons.mozilla.org.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:      ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes 2>/dev/null || true
