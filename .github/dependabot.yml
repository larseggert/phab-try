# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      # vitest + @vitest/coverage-v8 are peer-dep-locked: their majors
      # must move together. Group them so dependabot opens one PR
      # rather than two that each fail peer resolution until merged.
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # Keep pinned-SHA action references in .github/workflows current.
  # Without this, security-fixed action releases don't reach us.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
